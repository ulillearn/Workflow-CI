name: Model Retraining and Docker Build

on:
  push:
    paths:
      - 'MLProject/modelling.py'
      - 'MLProject/dataset_preprocessing/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install MLflow and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn 
      
      - name: Run MLflow Project (Retraining)
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Upload Model Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact
          path: MLProject/model_output/
          retention-days: 5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image via MLflow
        run: |
          cd MLProject
          mlflow models build-docker -m model_output -n ${{ secrets.DOCKER_USERNAME }}/it-role-model:latest

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/it-role-model:latest